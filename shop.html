<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="site-version" content="5.6">
<title>Makkie Mua 预定 | 本周菜单</title>
<meta name="description" content="查看 Makkie Mua 本周菜单、预定状态与取货信息。">
<meta name="robots" content="index,follow,max-image-preview:large">
<link rel="canonical" href="https://www.makkiemua.com/shop.html">
<link rel="icon" type="image/png" href="assets/images/brand/Makkie_Original_Logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/subpages.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-page="shop">
<nav>
  <button class="nav-menu" id="navMenuButton" type="button" aria-label="Open navigation" aria-expanded="false"><span class="nav-menu-lines"></span></button>
  <div class="nav-logo"><img class="nav-logo-mark" src="assets/images/brand/Makkie_Original_Logo.png" alt="Makkie logo"><span>Makkie Mua</span></div>
  <div class="top-tabs"><div class="hero-links"></div></div>
  <div class="nav-actions">
    <button class="nav-lang" id="langToggle" type="button" aria-label="Switch language"></button>
    <button class="nav-profile" type="button" data-profile-entry aria-label="我的">
      <svg class="nav-icon-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 20a6 6 0 0 0-12 0"></path>
        <circle cx="12" cy="8" r="4"></circle>
      </svg>
    </button>
    <button class="nav-book nav-book-header" type="button" data-order-entry aria-label="马上预定">
      <svg class="nav-book-icon-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7 8h10l1 11H6L7 8Z"></path>
        <path d="M9 8a3 3 0 0 1 6 0"></path>
      </svg>
      <span class="nav-book-label">马上预定</span>
    </button>
  </div>
</nav>

<div class="mobile-drawer" id="mobileDrawer" hidden>
  <div class="mobile-drawer-backdrop" data-mobile-drawer-close></div>
  <div class="mobile-drawer-panel">
    <div class="mobile-drawer-head">
      <div class="mobile-drawer-brand"><img src="assets/images/brand/Makkie_Original_Logo.png" alt="Makkie logo"><span>Makkie Mua</span></div>
      <button class="mobile-drawer-close" type="button" aria-label="Close navigation" data-mobile-drawer-close>&times;</button>
    </div>
    <div class="mobile-drawer-links"></div>
    <div class="mobile-drawer-actions"><button class="nav-book" type="button" data-order-entry>马上预定</button></div>
  </div>
</div>

<main class="page-main">
  <section class="page-hero reveal">
    <div class="page-hero-shell">
      <div class="sec-eye" id="pageEye">预定</div>
      <h1 class="sec-title" id="pageTitle">本周预定</h1>
      <p class="sec-sub" id="pageSub"></p>
      <div class="page-actions" id="pageActions"></div>
      <div class="shop-entry-status" id="shopEntryStatus" style="justify-content:center;">
        <span class="shop-pill">同步中</span>
      </div>
    </div>
  </section>

  <section class="shop reveal" id="shopAnchor">
    <div class="shop-panel">
      <div id="shopRoot" class="shop-loading">正在读取本周菜单...</div>
    </div>
  </section>
</main>

<footer>
  <div class="ft">
    <div class="ft-intro">
      <div class="ft-brand">𝕄𝕒𝕜𝕜𝕚𝕖 𝕄𝕦𝕒</div>
      <div class="ft-tag" id="footerTag">Butter off with Makkie</div>
      <div class="ft-location" id="footerLocation">Los Angeles &amp; Orange County</div>
      <a class="ft-credit" id="footerCredit" href="https://www.instagram.com/littlejulia_art/" target="_blank" rel="noreferrer">Makkie 艺术设计 by @littlejulia_art</a>
      <div class="ft-social">
        <a class="ft-social-link" href="https://www.instagram.com/makkiemua/" target="_blank" rel="noreferrer" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3.25" y="3.25" width="17.5" height="17.5" rx="5.5" stroke="currentColor" stroke-width="1.7"/>
            <circle cx="12" cy="12" r="4.1" stroke="currentColor" stroke-width="1.7"/>
            <circle cx="17.2" cy="6.8" r="1.15" fill="currentColor"/>
          </svg>
        </a>
        <a class="ft-social-link" href="https://xhslink.com/m/2ohrymfwufZ" target="_blank" rel="noreferrer" aria-label="Xiaohongshu">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="4.8" fill="#bc8450"/>
            <rect x="3.35" y="3.35" width="17.3" height="17.3" rx="4.45" stroke="#8e6136" stroke-width=".7"/>
            <text x="12" y="13.15" text-anchor="middle" fill="#fff8ee" font-size="4.25" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-weight="700">小红书</text>
          </svg>
        </a>
      </div>
    </div>
    <div><div class="ft-col-title" id="footerMenuTitle">网站</div><div class="ft-col" id="footerMenuLinks"></div></div>
    <div><div class="ft-col-title" id="footerContactTitle">关于 Makkie</div><div class="ft-col" id="footerContactLinks"></div></div>
  </div>
  <div class="ft-copy" id="footerCopy">© 2026 Makkie Mua. All Rights Reserved.</div>
</footer>

<div class="portal-overlay" id="orderConfirmOverlay" hidden>
  <div class="portal-overlay-backdrop" data-order-confirm-close></div>
  <div class="portal-panel" role="dialog" aria-modal="true">
    <button class="portal-close" type="button" aria-label="Close order confirmation" data-order-confirm-close>&times;</button>
    <div id="orderConfirmBody"></div>
  </div>
</div>
<div class="portal-overlay groupbuy-overlay" id="orderSuccessOverlay" hidden>
  <div class="portal-overlay-backdrop" data-order-success-close></div>
  <div class="portal-panel" role="dialog" aria-modal="true">
    <button class="portal-close" type="button" aria-label="Close" data-order-success-close>&times;</button>
    <div id="orderSuccessBody"></div>
  </div>
</div>
<div class="portal-overlay" id="profileOverlay" hidden>
  <div class="portal-overlay-backdrop" data-profile-close></div>
  <div class="portal-panel" role="dialog" aria-modal="true">
    <button class="portal-close" type="button" aria-label="Close profile" data-profile-close>&times;</button>
    <div id="profileOverlayBody"></div>
  </div>
</div>
<div class="portal-overlay" id="pickupOverlay" hidden>
  <div class="portal-overlay-backdrop" data-pickup-close></div>
  <div class="portal-panel" role="dialog" aria-modal="true">
    <button class="portal-close" type="button" aria-label="Close pickup selection" data-pickup-close>&times;</button>
    <div id="pickupOverlayBody"></div>
  </div>
</div>
<div class="portal-overlay" id="adminOverlay" hidden>
  <div class="portal-overlay-backdrop" data-admin-close></div>
  <div class="portal-panel" role="dialog" aria-modal="true">
    <button class="portal-close" type="button" aria-label="Close admin" data-admin-close>&times;</button>
    <div id="adminOverlayBody"></div>
  </div>
</div>

<script src="assets/subpages.js"></script>
<script src="assets/shop-page.js"></script>
</body>
</html>
